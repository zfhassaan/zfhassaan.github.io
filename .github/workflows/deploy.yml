name: Deploy portfolio to GitHub Pages

on:
  # Build & deploy on every push to the default branch
  push:
    branches: [master]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time; cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite -> ./docs)
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Matches build.outDir in vite.config.js
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
